eval_warehouse:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('PIPEMEDIC_DATABRICKS_HOST', '') }}"
      token: "{{ env_var('PIPEMEDIC_DATABRICKS_TOKEN', '') }}"
      http_path: "{{ env_var('PIPEMEDIC_DATABRICKS_HTTP_PATH', '') }}"
      schema: "{{ env_var('PIPEMEDIC_SCHEMA') }}"
      threads: 1
